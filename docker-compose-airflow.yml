version: "3.8"

# =============================================================================
#  STACK COMPLÈTE - HKT IPSSI
#  • PostgreSQL   → métadonnées internes Airflow uniquement
#  • MongoDB      → LOCAL (commenter si vous utilisez Atlas)
#  • Airflow      → orchestration (webserver + scheduler)
#  • back_end     → FastAPI (API principale)
#  • react-admin  → Interface administrateur (http://localhost:3000)
#  • react-client → Interface client (http://localhost:3001)
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL — RÉSERVÉ à Airflow, ne pas utiliser pour l'appli
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: hkt-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # MongoDB LOCAL — Commenter tout ce bloc si vous utilisez MongoDB Atlas
  # Accès local : mongodb://admin:admin@localhost:27017
  # ─────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: hkt-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: hkt_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-db-volume:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # Airflow — Webserver (UI sur http://localhost:8080)
  # Login : admin / admin
  # ─────────────────────────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: hkt-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "hkt_secret_key_2026"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      MONGO_URI: mongodb://admin:admin@mongodb:27017/hkt_db?authSource=admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true &&
        airflow webserver
      "
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # Airflow — Scheduler
  # ─────────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: hkt-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "hkt_secret_key_2026"
      MONGO_URI: mongodb://admin:admin@mongodb:27017/hkt_db?authSource=admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db migrate &&
        airflow scheduler
      "
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI — API principale
  # Accès : http://localhost:8000
  # Swagger : http://localhost:8000/docs
  # ─────────────────────────────────────────────────────────────────────────
  back_end:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: hkt-backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # ── Option 1 : MongoDB LOCAL ────────────────────────────────────────
      MONGO_URI: mongodb://admin:admin@mongodb:27017/hkt_db?authSource=admin
      # ── Option 2 : MongoDB Atlas (commenter Option 1, décommenter ici) ─
      # MONGO_URI: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/hkt_db
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASSWORD: admin
    volumes:
      - ./back_end:/app
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # React Admin — Interface administrateur
  # Accès : http://localhost:3000
  # ─────────────────────────────────────────────────────────────────────────
  react-admin:
    image: node:20-alpine
    container_name: hkt-react-admin
    working_dir: /app
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    restart: unless-stopped
    networks:
      - hkt-network

  # ─────────────────────────────────────────────────────────────────────────
  # React Client — Interface client
  # Accès : http://localhost:3001
  # ─────────────────────────────────────────────────────────────────────────
  react-client:
    image: node:20-alpine
    container_name: hkt-react-client
    working_dir: /app
    volumes:
      - ./frontend/client:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    restart: unless-stopped
    networks:
      - hkt-network

# =============================================================================
# Volumes & Réseau
# =============================================================================
volumes:
  postgres-db-volume:
    driver: local
  mongo-db-volume:
    driver: local

networks:
  hkt-network:
    driver: bridge